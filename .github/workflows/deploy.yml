name: Deploy rkac-finance (Next.js)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: rkac-finance-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install / Build
        run: |
          pnpm --version
          pnpm install --frozen-lockfile
          pnpm test --if-present
          pnpm build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.PROD_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "set -euo pipefail; \
             APP_DIR='${{ secrets.PROD_APP_DIR }}'; \
             if [ -z \"\$APP_DIR\" ]; then APP_DIR='/home/${{ secrets.PROD_USER }}/apps/rkac-finance'; fi; \
             DEPLOY_SCRIPT=\"\$HOME/bin/deploy-rkac-finance.sh\"; \
             test -d \"\$APP_DIR/.git\" || { echo \"Repo not found at \$APP_DIR\"; exit 1; }; \
             test -f \"\$DEPLOY_SCRIPT\" || { echo \"Deploy script not found: \$DEPLOY_SCRIPT\"; exit 1; }; \
             git config --global --add safe.directory \"\$APP_DIR\"; \
             DEPLOY_SHA=${{ github.sha }} APP_DIR=\"\$APP_DIR\" bash \"\$DEPLOY_SCRIPT\""
