name: Deploy rkac-finance (Next.js)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: rkac-finance-prod
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.30.1"
  DEPLOY_USER: brian
  APP_DIR: /home/brian/apps/rkac-finance
  DEPLOY_SCRIPT: /home/brian/bin/deploy-rkac-finance.sh

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test --if-present

      - name: Build
        run: pnpm build

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    environment: production

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Install known_hosts
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.PROD_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Validate known_hosts entry
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          ssh-keygen -F "[$PROD_HOST]:$PROD_SSH_PORT" -f ~/.ssh/known_hosts >/dev/null || {
            echo "Missing known_hosts entry for [$PROD_HOST]:$PROD_SSH_PORT"
            exit 1
          }

      - name: Deploy on server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o TCPKeepAlive=yes \
            -p "$PROD_SSH_PORT" \
            "$DEPLOY_USER@$PROD_HOST" \
            "APP_DIR='$APP_DIR' DEPLOY_SCRIPT='$DEPLOY_SCRIPT' DEPLOY_SHA='$DEPLOY_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          test -d "$APP_DIR/.git" || {
            echo "Repo not found at $APP_DIR"
            exit 1
          }

          test -f "$DEPLOY_SCRIPT" || {
            echo "Deploy script not found: $DEPLOY_SCRIPT"
            exit 1
          }

          git config --global --add safe.directory "$APP_DIR"
          APP_DIR="$APP_DIR" DEPLOY_SHA="$DEPLOY_SHA" bash "$DEPLOY_SCRIPT"
          REMOTE
