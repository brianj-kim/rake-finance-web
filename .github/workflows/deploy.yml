name: Deploy rkac-finance (Next.js)

on:
    push:
      branches: [main]
    workflow_dispatch: {}

permissions:
    contents: read

concurrency:
    group: rkac-finance-prod
    cancel-in-progress: true
jobs:
    build:
      runs-on: ubuntu-latest
      env:
        DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup pnpm
          uses: pnpm/action-setup@v4
          with:
            version: 9

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: "20"
            cache: "pnpm"

        - name: Install dependencies
          run: pnpm install --frozen-lockfile

        - name: Run tests
          run: pnpm test --if-present

        - name: Build
          run: pnpm build

    deploy:
      runs-on: ubuntu-latest
      needs: build
      environment: production

      steps:
        - name: Start SSH agent
          uses: webfactory/ssh-agent@v0.9.0
          with:
            ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

        - name: Add known_hosts
          run: |
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            printf '%s\n' "${{ secrets.PROD_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts

        - name: Deploy on server
          run: |
            ssh \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              -o TCPKeepAlive=yes \
              -p "${{ secrets.PROD_SSH_PORT }}" \
              "brian@${{ secrets.PROD_HOST }}" \
              "set -euo pipefail; \
               APP_DIR='/home/brian/apps/rkac-finance'; \
               DEPLOY_SCRIPT='/home/brian/bin/deploy-rkac-finance.sh'; \
               test -d \"\$APP_DIR/.git\" || { echo \"Repo not found at \$APP_DIR\"; exit 1; }; \
               test -f \"\$DEPLOY_SCRIPT\" || { echo \"Deploy script not found: \$DEPLOY_SCRIPT\"; exit 1; }; \
               git config --global --add safe.directory \"\$APP_DIR\"; \
               DEPLOY_SHA=${{ github.sha }} APP_DIR=\"\$APP_DIR\" bash \"\$DEPLOY_SCRIPT\""
